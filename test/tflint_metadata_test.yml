schemaVersion: 2.0.0

metadataTest:
  # OCI labels - these match values defined in the Dockerfile
  labels:
    - key: 'org.opencontainers.image.title'
      value: 'TFLint on Alpine Linux'
    - key: 'org.opencontainers.image.description'
      value: 'Lightweight TFLint Docker image built on Alpine Linux'
    - key: 'org.opencontainers.image.vendor'
      value: 'ragedunicorn'
    - key: 'org.opencontainers.image.authors'
      value: 'Michael Wiesendanger <michael.wiesendanger@gmail.com>'
    - key: 'org.opencontainers.image.source'
      value: 'https://github.com/RagedUnicorn/docker-tflint'
    - key: 'org.opencontainers.image.documentation'
      value: 'https://github.com/RagedUnicorn/docker-tflint/blob/master/README.md'
    - key: 'org.opencontainers.image.licenses'
      value: 'MIT'
    - key: 'org.opencontainers.image.base.name'
      value: 'docker.io/library/alpine:3.24.1'
  entrypoint: ['tflint']
  cmd: ['--help']
  workdir: '/workspace'
  user: 'tflint'
